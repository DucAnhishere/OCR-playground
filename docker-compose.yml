services:
  nginx:
    image: nginx:latest
    container_name: ocr_nginx
    ports:
      - "8000:80" # Exposed to outside on 8000
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      orchestrator:
        condition: service_healthy

  orchestrator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ocr_orchestrator
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - IMAGE_PROCESSOR_URL=http://image-processor:8004
      - PYTORCH_SERVICE_URL=http://ocr-pytorch:8002
      - PADDLE_SERVICE_URL=http://ocr-paddle:8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      image-processor:
        condition: service_healthy
      ocr-pytorch:
        condition: service_healthy
      ocr-paddle:
        condition: service_healthy

  image-processor:
    build:
      context: .
      dockerfile: image-processor/Dockerfile
    container_name: ocr_image_processor
    expose:
      - "8004"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr_frontend
    expose:
      - "5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_healthy

  ocr-pytorch:
    build:
      context: .
      dockerfile: ocr-pytorch/Dockerfile
    container_name: ocr_pytorch
    expose:
      - "8002"
    volumes:
      - ./weights/easyocr:/root/.EasyOCR
      - ./weights/vietocr:/root/.vietocr
      - ./weights/torch:/root/.cache/torch
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  ocr-paddle:
    build:
      context: .
      dockerfile: ocr-paddle/Dockerfile
    container_name: ocr_paddle
    expose:
      - "8003"
    volumes:
      - ./weights/paddleocr:/root/.paddleocr
      - ./weights/paddlex:/root/.paddlex
    environment:
      - PYTHONUNBUFFERED=1
      - FLAGS_use_mkldnn=0
      - FLAGS_fraction_of_cpu_memory_to_use=0.25
      - FLAGS_allocator_strategy=naive_best_fit
      - FLAGS_eager_delete_scope=1
      - FLAGS_eager_delete_tensor_gb=0.0
      - FLAGS_use_pinned_memory=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
