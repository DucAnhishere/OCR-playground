version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTORCH_SERVICE_URL=http://ocr-pytorch:8002
      - PADDLE_SERVICE_URL=http://ocr-paddle:8003
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ocr-pytorch
      - ocr-paddle

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  ocr-pytorch:
    build:
      context: ./ocr-pytorch
      dockerfile: Dockerfile
    container_name: ocr_pytorch
    ports:
      - "8002:8002"
    volumes:
      - ./ocr-pytorch:/app
      - ./weights/easyocr:/root/.EasyOCR
      - ./weights/vietocr:/root/.vietocr
      - ./weights/torch:/root/.cache/torch
    environment:
      - PYTHONUNBUFFERED=1
      - PADDLE_SERVICE_URL=http://ocr-paddle:8003
    command: uvicorn app:app --host 0.0.0.0 --port 8002
    depends_on:
      - ocr-paddle

  ocr-paddle:
    build:
      context: ./ocr-paddle
      dockerfile: Dockerfile
    container_name: ocr_paddle
    ports:
      - "8003:8003"
    volumes:
      - ./ocr-paddle:/app
      - ./weights/paddleocr:/root/.paddleocr
      - ./weights/paddlex:/root/.paddlex
    environment:
      - PYTHONUNBUFFERED=1
      - FLAGS_use_mkldnn=0
    command: uvicorn app:app --host 0.0.0.0 --port 8003

