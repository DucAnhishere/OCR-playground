services:
  nginx:
    image: nginx:latest
    container_name: ocr_nginx
    ports:
      - "8000:80" # Exposed to outside on 8000
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - orchestrator

  orchestrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr_orchestrator
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - IMAGE_PROCESSOR_URL=http://image-processor:8004
      - PYTORCH_SERVICE_URL=http://ocr-pytorch:8002
      - PADDLE_SERVICE_URL=http://ocr-paddle:8003
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - image-processor
      - ocr-pytorch
      - ocr-paddle

  image-processor:
    build:
      context: ./image-processor
      dockerfile: Dockerfile
    container_name: ocr_image_processor
    expose:
      - "8004"
    volumes:
      - ./image-processor:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn app:app --host 0.0.0.0 --port 8004 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr_frontend
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - orchestrator

  ocr-pytorch:
    build:
      context: ./ocr-pytorch
      dockerfile: Dockerfile
    container_name: ocr_pytorch
    expose:
      - "8002"
    volumes:
      - ./ocr-pytorch:/app
      - ./weights/easyocr:/root/.EasyOCR
      - ./weights/vietocr:/root/.vietocr
      - ./weights/torch:/root/.cache/torch
    environment:
      - PYTHONUNBUFFERED=1
      - PADDLE_SERVICE_URL=http://ocr-paddle:8003
    command: uvicorn app:app --host 0.0.0.0 --port 8002

  ocr-paddle:
    build:
      context: ./ocr-paddle
      dockerfile: Dockerfile
    container_name: ocr_paddle
    expose:
      - "8003"
    volumes:
      - ./ocr-paddle:/app
      - ./weights/paddleocr:/root/.paddleocr
      - ./weights/paddlex:/root/.paddlex
    environment:
      - PYTHONUNBUFFERED=1
      - FLAGS_use_mkldnn=0
    command: uvicorn app:app --host 0.0.0.0 --port 8003
